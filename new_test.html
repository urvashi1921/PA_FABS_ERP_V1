<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PA FABS — Textile ERP System</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #F7F4F1;
  --surface: #FFFFFF;
  --surface2: #F2EEE9;
  --surface3: #EAE5DE;
  --border: #E2DDD6;
  --border2: #CCC5BB;
  --text: #1C1815;
  --text2: #6E6560;
  --text3: #9E9690;
  /* PA FABS Brand — Red */
  --brand: #C8102E;
  --brand-dark: #960D22;
  --brand-light: #FCE8EC;
  --brand-mid: #E8405A;
  /* Accent — warm charcoal */
  --accent: #C8102E;
  --accent-light: #FCE8EC;
  --accent-hover: #960D22;
  /* Secondary tones */
  --green: #2E7D52;
  --green-light: #E6F4ED;
  --amber: #B45309;
  --amber-light: #FEF3C7;
  --blue: #1D4ED8;
  --blue-light: #EFF6FF;
  --purple: #6D28D9;
  --purple-light: #EDE9FE;
  --danger: #C8102E;
  --danger-light: #FCE8EC;
  --warn: #D97706;
  --warn-light: #FFFBEB;
  --success: #16A34A;
  --success-light: #DCFCE7;
  --info: #0284C7;
  --info-light: #E0F2FE;
  /* Shadows */
  --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 4px 12px rgba(0,0,0,0.04);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.09), 0 8px 24px rgba(0,0,0,0.05);
  --shadow-lg: 0 4px 16px rgba(0,0,0,0.11), 0 12px 32px rgba(0,0,0,0.07);
  /* Geometry */
  --radius: 10px;
  --radius-sm: 6px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  /* Gradients */
  --gradient-brand: linear-gradient(135deg, #C8102E 0%, #960D22 100%);
  --gradient-dark: linear-gradient(135deg, #1C1815 0%, #3A2E28 100%);
  --gradient-green: linear-gradient(135deg, #2E7D52 0%, #1A5C38 100%);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
input, select, textarea, button { font-family: inherit; }

/* ── APP LAYOUT ───────────────────────────────────── */
.app { display: none; }
.app.active { display: flex; min-height: 100vh; }

/* ── LOGIN ────────────────────────────────────────── */
#loginScreen {
  min-height: 100vh; display: flex; align-items: stretch; justify-content: stretch;
  background: var(--bg); position: relative; overflow: hidden;
}
#loginScreen::before {
  content: ''; position: absolute; width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(200,16,46,0.07) 0%, transparent 65%);
  top: -250px; right: -200px; border-radius: 50%;
}
#loginScreen::after {
  content: ''; position: absolute; width: 500px; height: 500px;
  background: radial-gradient(circle, rgba(200,16,46,0.04) 0%, transparent 65%);
  bottom: -150px; left: -150px; border-radius: 50%;
}
.login-container {
  display: flex; width: 100%; min-height: 100vh; position: relative; z-index: 1;
}
.login-left {
  flex: 1; background: linear-gradient(135deg, #1C1815 0%, #3A2E28 100%);
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  padding: 3rem; position: relative;
}
.login-left-content {
  position: relative; z-index: 1; text-align: center; color: white;
  max-width: 450px;
}
.login-brand-logo {
  width: 150px; height: 150px; background: white;
  border-radius: 20px; display: flex; align-items: center; justify-content: center;
  margin: 0 auto 2rem; box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  overflow: hidden;
}
.login-brand-logo img { width: 100%; height: 100%; object-fit: cover; }
.login-brand-title { font-size: 42px; font-weight: 800; margin-bottom: 0.5rem; letter-spacing: -1px; }
.login-brand-tagline { font-size: 18px; font-weight: 400; opacity: 0.9; margin-bottom: 2rem; font-style: italic; }
.login-brand-sub { font-size: 14px; color: rgba(255,255,255,0.7); margin-bottom: 3rem; text-transform: uppercase; letter-spacing: 2px; }
.login-features { display: flex; flex-direction: column; gap: 1rem; text-align: left; }
.login-feature {
  display: flex; align-items: center; gap: 1rem;
  padding: 0.875rem 1.25rem; background: rgba(255,255,255,0.08);
  border-radius: 10px; backdrop-filter: blur(10px);
}
.login-feature-icon { font-size: 20px; }
.login-feature-text { font-size: 14px; font-weight: 500; opacity: 0.95; }
.login-right {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 3rem; background: var(--surface); position: relative; z-index: 2;
}
.login-box {
  width: 100%; max-width: 420px; animation: slideUp .4s ease; pointer-events: auto;
}
@keyframes slideUp { from { opacity:0; transform: translateY(24px); } to { opacity:1; transform: translateY(0); } }

.login-logo-wrap {
  display: flex; align-items: center; justify-content: center; gap: 14px;
  margin-bottom: 1rem;
}
.login-logo {
  width: 80px; height: 80px; background: var(--brand-light);
  border-radius: 12px; display: flex; align-items: center; justify-content: center;
  overflow: hidden; border: 2px solid var(--brand);
}
.login-logo img { width: 100%; height: 100%; object-fit: cover; }
.login-logo-text { }
.login-logo-text h2 { font-size: 26px; font-weight: 800; color: var(--brand); letter-spacing: -.3px; }
.login-logo-text p { font-size: 13px; color: var(--text2); font-style: italic; margin-top: 2px; }

.login-divider { height: 1px; background: var(--border); margin-bottom: 1.5rem; }
.login-heading { font-size: 14px; font-weight: 600; text-align: center; margin-bottom: 1rem; color: var(--text2); }

.role-tabs {
  display: grid; grid-template-columns: 1fr 1fr; background: var(--surface2);
  border-radius: 8px; padding: 3px; margin-bottom: 1.25rem; gap: 3px; pointer-events: auto;
}
.role-tab {
  padding: 10px; text-align: center; font-size: 13px; font-weight: 600;
  border-radius: 6px; cursor: pointer; transition: all .2s; color: var(--text2);
  border: none; background: transparent; pointer-events: auto;
}
.role-tab.active { background: var(--surface); color: var(--brand); box-shadow: var(--shadow); }
.role-tab:hover { background: var(--surface); color: var(--brand); }

.form-group { margin-bottom: 0.9rem; }
.form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text2); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .04em; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 11px 13px; border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); font-size: 14px; background: var(--surface);
  color: var(--text); outline: none; transition: border-color .2s, box-shadow .2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--brand); box-shadow: 0 0 0 3px rgba(200,16,46,0.1);
}

.login-btn {
  width: 100%; padding: 12px; background: var(--gradient-brand); color: white;
  border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
  cursor: pointer; transition: opacity .2s, transform .1s; letter-spacing: .02em; margin-top: 0.5rem;
}
.login-btn:hover { opacity: .92; }
.login-btn:active { transform: scale(.99); }
.login-hint { font-size: 11px; color: var(--text3); text-align: center; margin-top: 1rem; }
.link-btn {
  background: none; border: none; color: var(--brand); font-size: 13px;
  font-weight: 600; cursor: pointer; text-decoration: underline; padding: 0;
}
.link-btn:hover { color: var(--brand-dark); }

/* Responsive login */
@media (max-width: 900px) {
  .login-container { flex-direction: column; }
  .login-left { padding: 2rem; flex: none; }
  .login-left-content { max-width: 100%; }
  .login-brand-logo { width: 80px; height: 80px; }
  .login-brand-title { font-size: 32px; }
  .login-brand-tagline { font-size: 14px; }
  .login-features { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; }
  .login-feature { padding: 0.6rem 1rem; }
  .login-feature-text { font-size: 12px; }
  .login-right { padding: 2rem; }
}

/* ── REGISTER ─────────────────────────────────────── */
#registerScreen {
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  background: var(--bg); position: relative; overflow: hidden;
}
#registerScreen::before {
  content: ''; position: absolute; width: 700px; height: 700px;
  background: radial-gradient(circle, rgba(200,16,46,0.06) 0%, transparent 65%);
  top: -250px; left: -250px; border-radius: 50%;
}
.register-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-xl); padding: 2.5rem; width: 500px;
  box-shadow: var(--shadow-lg); position: relative; z-index: 1; animation: slideUp .4s ease;
}
.register-logo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 1.25rem; }
.register-logo-icon {
  width: 52px; height: 52px; background: white; border-radius: 12px;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
  box-shadow: var(--shadow-md); border: 2px solid var(--brand-light);
}
.register-logo-icon img { width: 100%; height: 100%; object-fit: contain; }
.register-title { text-align: center; font-size: 20px; font-weight: 700; margin-bottom: .25rem; }
.register-sub { text-align: center; font-size: 13px; color: var(--text2); margin-bottom: 1.5rem; }

.register-steps { margin-bottom: 1.5rem; }
.step-indicator { display: flex; align-items: center; justify-content: center; gap: 0; margin-bottom: .5rem; }
.step {
  width: 32px; height: 32px; border-radius: 50%; background: var(--surface2);
  color: var(--text3); display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 700; border: 2px solid var(--border); transition: all .3s;
}
.step.active { background: var(--brand); color: white; border-color: var(--brand); transform: scale(1.1); }
.step.completed { background: var(--green); color: white; border-color: var(--green); }
.step-line { flex: 1; height: 2px; background: var(--border); margin: 0 -8px; transition: all .3s; }
.step-line.completed { background: var(--green); }
.step-labels { display: flex; justify-content: space-around; }
.step-label { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .05em; }
.step-label.active { color: var(--brand); }
.step-label.completed { color: var(--green); }
.register-step { display: none; animation: fadeIn .3s ease; }
.register-step.active { display: block; }
.register-btn {
  width: 100%; padding: 11px; background: var(--gradient-brand); color: white;
  border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all .2s; margin-top: 1rem;
}
.register-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }

/* ── SIDEBAR ──────────────────────────────────────── */
.sidebar {
  width: 230px; flex-shrink: 0;
  background: var(--surface); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; padding: 1.25rem 0;
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
}
.sidebar-header { padding: 0 1.25rem 1.25rem; border-bottom: 1px solid var(--border); margin-bottom: 1rem; }
.sidebar-logo { display: flex; align-items: center; gap: 10px; }
.sidebar-logo-icon {
  width: 40px; height: 40px; background: white; border-radius: 9px;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  overflow: hidden; box-shadow: var(--shadow); border: 1.5px solid var(--brand-light);
}
.sidebar-logo-icon img { width: 100%; height: 100%; object-fit: contain; }
.sidebar-logo-name { font-size: 15px; font-weight: 700; color: var(--brand); }
.sidebar-logo-sub { font-size: 11px; color: var(--text2); }
.sidebar-brand-stripe {
  height: 3px; background: var(--gradient-brand); border-radius: 0 0 2px 2px;
  margin: 0 1.25rem .75rem; border-radius: 2px;
}
.nav-section { padding: 0 .75rem; margin-bottom: .5rem; }
.nav-section-label { font-size: 10px; font-weight: 700; color: var(--text3); letter-spacing: .1em; text-transform: uppercase; padding: 0 .5rem; margin-bottom: .4rem; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 10px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500; color: var(--text2);
  cursor: pointer; transition: all .15s; border: none; background: transparent; width: 100%; text-align: left;
}
.nav-item:hover { background: var(--surface2); color: var(--text); }
.nav-item.active { background: var(--brand-light); color: var(--brand); font-weight: 600; }
.nav-item.active .nav-icon { color: var(--brand); }
.nav-icon { width: 16px; height: 16px; flex-shrink: 0; }
.nav-badge {
  margin-left: auto; background: var(--brand); color: white;
  font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 10px;
}
.sidebar-footer { margin-top: auto; padding: 1rem 1.25rem 0; border-top: 1px solid var(--border); }
.user-chip { display: flex; align-items: center; gap: 8px; }
.user-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--gradient-brand); display: flex; align-items: center; justify-content: center;
  color: white; font-size: 12px; font-weight: 700; flex-shrink: 0;
}
.user-info { flex: 1; min-width: 0; }
.user-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-role { font-size: 11px; color: var(--text2); }
.logout-btn {
  padding: 4px 9px; border: 1.5px solid var(--border); border-radius: 5px;
  background: transparent; cursor: pointer; color: var(--text2); font-size: 11px;
  font-weight: 600; transition: all .15s;
}
.logout-btn:hover { border-color: var(--brand); color: var(--brand); background: var(--brand-light); }

/* ── MAIN ─────────────────────────────────────────── */
.main { flex: 1; overflow-y: auto; background: var(--bg); }
.page { display: none; padding: 2rem; animation: fadeIn .25s ease; }
.page.active { display: block; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.page-header { margin-bottom: 1.75rem; display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
.page-header-left { }
.page-title { font-size: 22px; font-weight: 700; margin-bottom: .2rem; letter-spacing: -.3px; }
.page-sub { font-size: 14px; color: var(--text2); }
.page-header-actions { display: flex; gap: .5rem; flex-shrink: 0; }

/* ── STAT CARDS ───────────────────────────────────── */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.75rem; }
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.25rem; box-shadow: var(--shadow);
  position: relative; overflow: hidden;
}
.stat-card::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  background: var(--gradient-brand); opacity: 0; transition: opacity .2s;
}
.stat-card:hover::after { opacity: 1; }
.stat-icon { width: 36px; height: 36px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-bottom: .75rem; }
.stat-label { font-size: 11px; font-weight: 600; color: var(--text2); text-transform: uppercase; letter-spacing: .05em; margin-bottom: .4rem; }
.stat-val { font-size: 28px; font-weight: 700; line-height: 1; }
.stat-sub { font-size: 12px; color: var(--text2); margin-top: .3rem; }

/* ── TABLE ────────────────────────────────────────── */
.table-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow);
}
.table-toolbar {
  padding: .875rem 1.25rem; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: .75rem; flex-wrap: wrap;
}
.table-toolbar-title { font-size: 14px; font-weight: 700; flex: 1; color: var(--text); }
.search-input {
  padding: 7px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
  font-size: 13px; background: var(--surface2); outline: none; width: 200px; transition: all .2s;
}
.search-input:focus { border-color: var(--brand); background: var(--surface); box-shadow: 0 0 0 3px rgba(200,16,46,0.08); }
.data-table { width: 100%; border-collapse: collapse; }
.data-table th {
  text-align: left; padding: 10px 1.25rem; font-size: 11px; font-weight: 700;
  color: var(--text3); text-transform: uppercase; letter-spacing: .07em;
  background: var(--surface2); border-bottom: 1px solid var(--border);
}
.data-table td { padding: 11px 1.25rem; font-size: 13px; border-bottom: 1px solid var(--border); color: var(--text); }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:hover td { background: #FFF8F9; }
.data-table tr { transition: background .1s; }

/* ── BADGES ───────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; padding: 3px 9px;
  border-radius: 20px; font-size: 11px; font-weight: 600;
}
.badge-red { background: var(--brand-light); color: var(--brand); }
.badge-green { background: var(--green-light); color: var(--green); }
.badge-amber { background: var(--amber-light); color: var(--amber); }
.badge-blue { background: var(--blue-light); color: var(--blue); }
.badge-purple { background: var(--purple-light); color: var(--purple); }
.badge-gray { background: var(--surface2); color: var(--text2); }

/* ── PROGRESS ─────────────────────────────────────── */
.progress { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
.progress-bar { height: 100%; border-radius: 3px; background: var(--gradient-brand); transition: width .4s; }
.progress-bar.green { background: var(--gradient-green); }

/* ── FORMS ────────────────────────────────────────── */
.form-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.75rem; box-shadow: var(--shadow); width: 100%;
}
.form-card + .form-card { margin-top: 1.25rem; }
.form-section-title {
  font-size: 13px; font-weight: 700; margin-bottom: 1.25rem;
  padding-bottom: .75rem; border-bottom: 1px solid var(--border);
  color: var(--text); display: flex; align-items: center; gap: .5rem;
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
.form-grid.cols3 { grid-template-columns: 1fr 1fr 1fr; }
.form-grid.cols4 { grid-template-columns: 1fr 1fr 1fr 1fr; }
.form-group select, .form-group textarea {
  width: 100%; padding: 9px 12px; border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); font-size: 13px; background: var(--surface);
  color: var(--text); outline: none; cursor: pointer; transition: all .2s;
}
.form-group select:focus, .form-group textarea:focus {
  border-color: var(--brand); box-shadow: 0 0 0 3px rgba(200,16,46,0.08);
}
.form-group textarea { resize: vertical; min-height: 80px; }
.form-group input:disabled, .form-group select:disabled {
  background: var(--surface2); color: var(--text2); cursor: not-allowed;
}
.readonly-val {
  padding: 9px 12px; background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
  font-family: 'JetBrains Mono', monospace;
}
.readonly-val.highlight { background: var(--brand-light); color: var(--brand); border-color: rgba(200,16,46,.2); }
.readonly-val.green-highlight { background: var(--green-light); color: var(--green); border-color: rgba(46,125,82,.2); }
.form-row { display: flex; align-items: center; gap: 1rem; }
.form-actions { display: flex; gap: .75rem; margin-top: 1.5rem; }
.field-required { color: var(--brand); }

/* ── BUTTONS ──────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 18px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600;
  cursor: pointer; transition: all .15s; border: 1.5px solid var(--border);
  background: transparent; color: var(--text);
}
.btn:hover { background: var(--surface2); }
.btn-primary { background: var(--gradient-brand); color: white; border-color: var(--brand); }
.btn-primary:hover { opacity: .9; background: var(--gradient-brand); }
.btn-success { background: var(--gradient-green); color: white; border-color: var(--green); }
.btn-success:hover { opacity: .9; }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-outline-brand { border-color: var(--brand); color: var(--brand); background: transparent; }
.btn-outline-brand:hover { background: var(--brand-light); }

/* ── CHECKBOX ─────────────────────────────────────── */
.check-row { display: flex; align-items: center; gap: 10px; padding: .6rem 0; }
.check-box {
  width: 18px; height: 18px; border: 1.5px solid var(--border2);
  border-radius: 4px; flex-shrink: 0; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all .15s;
}
.check-box.checked { background: var(--brand); border-color: var(--brand); }
.check-box.checked::after { content: '✓'; color: white; font-size: 11px; font-weight: 700; }
.check-label { font-size: 13px; }

/* ── DYNAMIC ROWS ─────────────────────────────────── */
.dynamic-row {
  display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto;
  gap: 10px; align-items: end; margin-bottom: 10px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px;
}
.dynamic-row.warp-row { border-left: 3px solid var(--brand); }
.dynamic-row.weft-row { border-left: 3px solid var(--green); }
.btn-remove-row {
  width: 28px; height: 28px; background: none; border: 1.5px solid var(--border2);
  border-radius: 6px; cursor: pointer; color: var(--text3); font-size: 14px;
  display: flex; align-items: center; justify-content: center; transition: all .15s;
}
.btn-remove-row:hover { background: var(--brand-light); border-color: var(--brand); color: var(--brand); }

/* ── INFO ALERT BOX ───────────────────────────────── */
.info-box {
  background: var(--blue-light); border: 1px solid rgba(29,78,216,.2);

  font-size: 12px; color: var(--blue); font-weight: 500;
}
.warn-box {
  background: var(--amber-light); border: 1px solid rgba(180,83,9,.2);

}
.brand-box {

/* ── CYCLE BADGE ──────────────────────────────────── */
.cycle-badge {

/* ── LOOM GRID ────────────────────────────────────── */
.loom-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: .75rem; margin-bottom: 1.5rem; }
.loom-cell {

}
.loom-cell.free { border-color: var(--green); background: var(--green-light); }

.loom-cell.free .loom-num { color: var(--green); }
.loom-cell.occupied .loom-num { color: var(--brand); }
.loom-cell.on-hold .loom-num { color: var(--amber); }
.loom-status-text { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin-top: 4px; }
.loom-cell.free .loom-status-text { color: var(--green); }
.loom-cell.occupied .loom-status-text { color: var(--brand); }
.loom-cell.on-hold .loom-status-text { color: var(--amber); }
.loom-po { font-size: 10px; color: var(--text2); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── DC SLIP ──────────────────────────────────────── */
.dc-slip {

.dc-company-name { font-size: 18px; font-weight: 800; color: var(--brand); font-family: 'Plus Jakarta Sans', sans-serif; }
.dc-company-sub { font-size: 10px; color: var(--text2); font-family: 'Plus Jakarta Sans', sans-serif; }
.dc-slip-title { text-align: right; }

.dc-piece-table th, .dc-piece-table td { border: 1px solid var(--border2); padding: 6px 8px; text-align: left; font-size: 11px; }

.dc-footer { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; margin-top: 1.5rem; padding-top: 1rem; border-top: 1px solid var(--border); }
.dc-sig-line { border-top: 1px solid var(--text); margin-top: 2rem; padding-top: .25rem; text-align: center; font-size: 10px; }

/* ── DETAIL PANEL ─────────────────────────────────── */
.detail-panel {
  position: fixed; right: 0; top: 0; bottom: 0; width: 500px;
  background: var(--surface); border-left: 1px solid var(--border);
  box-shadow: -8px 0 32px rgba(0,0,0,0.1);

}
.panel-header-brand { height: 3px; background: var(--gradient-brand); }
.panel-close {
  width: 28px; height: 28px; border-radius: 6px; border: 1.5px solid var(--border);
  background: transparent; cursor: pointer; display: flex; align-items: center;
  justify-content: center; color: var(--text2); font-size: 16px; transition: all .15s; margin-left: auto;
}
.panel-close:hover { background: var(--brand-light); color: var(--brand); border-color: var(--brand); }
.panel-body { padding: 1.5rem; }
.detail-section { margin-bottom: 1.5rem; }
.detail-section-title { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; letter-spacing: .07em; margin-bottom: .75rem; padding-bottom: .4rem; border-bottom: 1px solid var(--border); }
.detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; }

.overlay { position: fixed; inset: 0; background: rgba(0,0,0,.35); z-index: 99; display: none; backdrop-filter: blur(2px); }

/* ── TOAST ────────────────────────────────────────── */
.toast {
  position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--text); color: white; padding: 11px 22px;
  border-radius: var(--radius); font-size: 13px; font-weight: 600;
  box-shadow: var(--shadow-lg); z-index: 999; transition: transform .3s ease; pointer-events: none;
  border-left: 4px solid var(--brand);
}

/* ── EMPTY STATE ──────────────────────────────────── */
.empty-state { text-align: center; padding: 3rem 1rem; color: var(--text2); }
.empty-state p { font-size: 14px; }

/* ── RESPONSIVE ───────────────────────────────────── */
@media (max-width: 768px) {

}
